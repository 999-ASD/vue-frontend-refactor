                    </ol>
                </nav>
                <div>
                    <div class="mb-3">
                        <button type="button" id="btn-register" class="btn btn-primary me-2">挂号</button>
                        <button type="button" id="btn-clear" class="btn btn-danger">清空</button>
                    </div>
                    <form id="register-form">
                        <fieldset class="bg-light rounded p-3 mb-3 border-0">
                            <legend class="fw-bold">基本信息：</legend>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">病历号：</div>
                                <div class="col-md-4"><input type="text" name="caseNo" class="form-control"></div>
                                <div class="col-md-2 text-end">姓名：</div>
                                <div class="col-md-4"><input type="text" name="name" class="form-control"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">性别：</div>
                                <div class="col-md-4"><select name="gender" class="form-select"><option>男</option><option>女</option></select></div>
                                <div class="col-md-2 text-end">年龄：</div>
                                <div class="col-md-4 d-flex align-items-center">
                                    <input type="number" name="age" class="form-control me-2">
                                    <select class="form-select w-auto"><option>年</option></select>
                                </div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">出生日期：</div>
                                <div class="col-md-4"><input type="date" name="birth" class="form-control"></div>
                                <div class="col-md-2 text-end">身份证：</div>
                                <div class="col-md-4"><input type="text" name="idCard" class="form-control"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">家庭住址：</div>
                                <div class="col-md-10"><input type="text" name="address" class="form-control"></div>
                            </div>
                        </fieldset>
                        <fieldset class="bg-light rounded p-3 mb-3 border-0">
                            <legend class="fw-bold">挂号信息：</legend>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">结算类别：</div>
                                <div class="col-md-4"><select name="payType" class="form-select"><option>自费</option><option>医保</option></select></div>
                                <div class="col-md-2 text-end">看诊日期：</div>
                                <div class="col-md-4"><input type="date" name="visitDate" class="form-control"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">午别：</div>
                                <div class="col-md-4"><select name="noon" class="form-select"><option>上午</option><option>下午</option></select></div>
                                <div class="col-md-2 text-end">挂号科室：</div>
                                <div class="col-md-4"><select name="dept" class="form-select"><option>呼吸内科</option><option>神经内科</option><option>普外科</option><option>儿科</option><option>骨科</option></select></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">号别：</div>
                                <div class="col-md-4"><select name="noType" class="form-select"><option>主治医生</option><option>副主任医生</option><option>主任医生</option></select></div>
                                <div class="col-md-2 text-end">看诊医生：</div>
                                <div class="col-md-4"><select name="doctor" class="form-select"><option>张三有</option><option>李思华</option><option>王仆陆</option><option>马梦梅</option><option>张新如</option><option>李欣玲</option><option>普亮</option><option>杨莉莉</option><option>王一丰</option><option>贾雪明</option><option>周忠厚</option></select></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">初始号额：</div>
                                <div class="col-md-4"><input type="number" name="initNum" class="form-control"></div>
                                <div class="col-md-2 text-end">已用号额：</div>
                                <div class="col-md-4"><input type="number" name="usedNum" class="form-control"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">病历本：</div>
                                <div class="col-md-4"><select name="caseBook" class="form-select"><option>是</option><option>否</option></select></div>
                                <div class="col-md-2 text-end">应收金额：</div>
                                <div class="col-md-4"><input type="number" name="fee" class="form-control"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-md-2 text-end">收款方式：</div>
                                <div class="col-md-4"><select name="payMethod" class="form-select"><option>现金</option><option>微信</option><option>支付宝</option><option>医保卡</option><option>农合卡</option></select></div>
                            </div>
                        </fieldset>
                    </form>
                </div>
            </main>
        </div>

    <script>
    document.getElementById('btn-clear').onclick = function() {
        document.getElementById('register-form').reset();
    };
    document.getElementById('btn-register').onclick = function() {
        alert('挂号成功！（演示）');
    };
    </script>
